hero_tag: "Est. 2001, refreshed since"
hero_heading: "Bicycle Wagga Wagga's famous jersey"
hero_text: "\"Be Safe, Be Smart, Be Seen\" — the motto is stitched into the design, and the jersey has turned up on roads from Scotland to Western Australia."
hero_image: "/assets/img/jersey-hero.jpg"

story_heading: "Once-a-year colour, always official in yellow"
story_paragraphs:
  - "Overseas visitors to Wagga Wagga have bought jerseys and worn them home, or on to other parts of the world, where they've become conversation starters. The \"Murder of Crows\" photo shows the colour alternatives that have appeared in recent years — members have enthusiastically adopted the once-a-year colour change, but the traditional hi-vis yellow remains the club's official jersey."
  - "Our jerseys have proven so sought-after, nationally and internationally, that some owners have worn theirs for years and then sold it off their back — unwashed and all — for more than they originally paid."
  - "Want to secure one of these rare collector's items? Contact BWW's Secretary by email — first in, best dressed."
story_image: "/assets/img/jersey-detail.png"

