eras_note: "Other eras on record: 2001–2009 (John O'Groats, Scotland), 2010–2019 (Sant Feliu de Guíxols, Spain; Mont Ventoux, Provence), 2020 – March, then no travel until 2023 (COVID-19 travel restrictions), and 2023 onward (County Cork, Ireland) — plus the Great Ocean Way Trail near Esperance, Western Australia, for Peculiar Places in Australia."

callout_heading: "Want a BWW jersey?"
callout_text: "Get in touch with the Secretary — supply is limited, and colours change once a year."
