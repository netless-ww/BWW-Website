waypoints:
  - label: "Waypoint 1 — Who we are"
    heading: "A group of cyclists, formed in 1997"
    text: "BWW is a group of cyclists who enjoy cycling as a social activity and want to promote it as a safe, responsible mode of transport. We've worked with Wagga Wagga City Council on the city's Bicycle Plan and continue to help build and maintain local bike facilities."
    button_text: "Read our story"
    button_link: "/about/"
    image: "/assets/img/about-eoy-group.jpg"
  - label: "Waypoint 2 — Regular rides"
    heading: "Sunday, Wednesday and once-a-month, all year round"
    text: "The Sunday Ride, Coffee Grinds and the Fat Tyred Ride run like clockwork, rain or shine (weather policy permitting). No one gets left behind — riders at the back are never riding alone."
    button_text: "See the ride schedule"
    button_link: "/rides/"
    image: "/assets/img/rides-hero.jpg"
  - label: "Waypoint 3 — The jersey"
    heading: "\"Be Safe, Be Smart, Be Seen\""
    text: "Designed in 2001 and refreshed since, BWW's jersey has turned up on roads from Scotland to Western Australia. Members change colours once a year — the traditional hi-vis yellow remains the club's official shade."
    button_text: "See where it's travelled"
    button_link: "/jersey/"
    image: "/assets/img/jersey-hero.jpg"
  - label: "Waypoint 4 — Join us"
    heading: "Membership costs less than a decent inner tube"
    text: "$30 a year gets you a 10% discount at both specialist bike shops in town, club WhatsApp and Facebook updates, and a say in what BWW rides next. Junior membership is free."
    button_text: "Join Bicycle Wagga Wagga"
    button_link: "/membership/"
    image: "/assets/img/about-railtrail.png"

visitor_callout_heading: "Riding through and need a route?"
visitor_callout_text: "Our members have mapped and vetted road, gravel and family-friendly rides around the district, ready to load onto RideWithGPS."
