hero_tag: "Wagga Wagga, NSW · Est. 1997"
hero_heading: "Promoting cycling in the local community"
hero_text: "Bicycle Wagga Wagga Inc. is a not-for-profit club that organises regular group rides around Wagga Wagga and the Riverina — for families, first-timers and hardened bunch riders alike."
hero_image: "/assets/img/hero-home.png"

