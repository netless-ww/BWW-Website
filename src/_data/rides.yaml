annual_rides:
  - heading: "End of Winter Ride"
    text: "Held on the last Sunday in August, replacing the regular Sunday Ride."
  - heading: "End of Year Ride"
    text: "A weekend away with long and short course options, shared meals, and a Sunday loop — recent editions have gathered the club at Holbrook and Culcairn."

visitor_intro: "BWW members have picked out a number of rides they consider safe for visitors, grouped as road rides on quiet local roads, hybrid/MTB rides on bike paths and gravel, and family rides for those visiting with children. You'll need a free RideWithGPS account to download maps, cue sheets and device files."
visitor_routes:
  - heading: "Ladysmith Loop"
    text: "~60 km on quiet country roads, starting and finishing at Crackerjacks Café (Main St, Lake Albert), with a few climbs and a shop stop in Ladysmith."
    link: "https://ridewithgps.com/routes/39630299"
  - heading: "Big Springs Loop"
    text: "56 km from the Lake Albert shopping centre, out through Big Springs and back via O'Brien's Creek and Holbrook Roads."
    link: "https://ridewithgps.com/routes/40518462"
  - heading: "Coolamon Loop"
    text: "Around 100 km, mostly quiet country roads with some climbing, best suited to experienced road riders. Halfway point is Coolamon township, worth a stop for refreshments. Starts/finishes at the Northshore Café, North Wagga."
    link: "https://ridewithgps.com/routes/40857717"
  - heading: "Gelston Park"
    text: "A short road ride for those after a bit of hill climbing."
    link: "https://ridewithgps.com/routes/40860566"
