ride_descriptions:
  - heading: "Sunday Ride"
    text: "The original social ride conducted by BWW — a road ride of about two hours, finishing at a nominated spot for refreshments and conversation. Not run on the last Sunday in August (End of Winter Ride) or the Sunday of the Labour Day long weekend (Gears and Beers)."
  - heading: "Coffee Grinds"
    text: "A road ride of roughly two hours on Wednesday mornings, starting at Apex Park and finishing at the Kooringal Mall for morning tea."
  - heading: "Fat Tyred Ride"
    text: "Mostly on tracks and cycleways with little traffic — a mountain, hybrid or touring bike with fat tyres is ideal. Not a ride to bring a road bike on. Runs about two hours."
  - heading: "Gravel Ride"
    text: "Best on a gravel bike (a fit rider on a mountain bike or hybrid can manage too). Roads vary from smooth to stony, linked by cycle paths and short tar sections, with light traffic. About two hours."

informal_ride_heading: "Other weekly rides (no ride leader)"
informal_ride_text: "The Thursday Ladies' Fat Tyred Ride leaves the Boat Club at 9:00 am (cooler months) or 8:00 am (warmer months). Start times can shift in early autumn and spring depending on the weather — changes are posted on the BWW WhatsApp group. This and other informal rides are not official BWW rides and don't carry ride leader support, but happen regularly and may interest other local cyclists."

general_info:
  - "All rides are open to the public unless otherwise stated in the ride description."
  - "Ride Leaders are volunteers — please follow their instructions to keep every ride safe and enjoyable."
  - "Junior riders are welcome on most rides but must be accompanied by a cycling adult carer."
  - "No-one gets left behind: on out-and-back and loop rides there are always two riders at the back; on long rides the peloton rides together or splits into smaller groups depending on numbers."
risk_heading: "Riding at your own risk"
risk_text: "All participants join BWW rides as volunteers in all respects and accept sole responsibility for any injury however incurred. Bicycle Wagga Wagga and its Ride Leaders cannot be held liable for any injury or damage resulting from participation."

