  - name: "Sunday Ride"
    when: "Every Sunday"
    tag: "Road"
    tag_style: "tag"
    cooler_time: "1:00 pm"
    warmer_time: "8:00 am"
    meets_at: "North Wagga Store carpark"
  - name: "Coffee Grinds"
    when: "Wednesday mornings"
    tag: "Road"
    tag_style: "tag"
    cooler_time: "9:30 am"
    warmer_time: "8:00 am"
