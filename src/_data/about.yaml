intro_tag: "Since 1997"
intro_heading: "About Bicycle Wagga Wagga"
intro_text: "A group of cyclists who enjoy cycling as a social activity, and who want to promote it as a safe, responsible way to get around."

history_heading: "Formed in 1997, still rolling"
history_paragraphs:
  - "Bicycle Wagga Wagga Inc. (BWW) is a group of cyclists who enjoy cycling as a social activity and want to promote cycling as a safe and responsible mode of transport. The group formed in 1997 and has continued since to provide riding opportunities as well as fostering the advancement of cycling."
  - "BWW was involved in the development of the Wagga Wagga Bicycle Plan and continues to work with Wagga Wagga City Council on the development, construction and maintenance of bicycle facilities in the city."
  - "Bicycle Wagga Wagga Inc. became an incorporated body under the Associations Incorporation Act 2009 in August 2010 (Incorporation Number INC9893924, ABN 78 918 095 205)."
history_image: "/assets/img/about-eoy-2.jpg"
constitution_pdf: "/assets/docs/bww.Constitution.v2012.pdf"

ride_types:
  - tag: "Weekly"
    tag_style: "tag"
    heading: "Regular rides"
    text: "Regular weekly casual rides around Wagga Wagga, designed to suit cyclists of all abilities, including families."
  - tag: "Monthly"
    tag_style: "tag-clay"
    heading: "Fat Tyred & Long Rides"
    text: "A Fat Tyred Ride generally runs the first Sunday of the month on tracks and trails away from traffic. A Long Ride — about 100km on the road — generally runs the second Sunday."
  - tag: "Annual"
    tag_style: "tag-sky"
    heading: "Weekend rides"
    text: "BWW runs a number of weekend rides throughout the year, based in or from Wagga Wagga or further afield, just for a change of scenery."

activities_heading: "End of Year rides, and everything around them"
activities_text: "Club events involving bike maintenance, touring information, club nights and social evenings are organised for the benefit of members and other interested people — alongside a proper weekend away each year."
activities_cards:
  - heading: "End of Year rides"
    text: "A long-standing tradition: long and short course groups leave together on the Saturday, meet for lunch along the way, and regroup for a shared dinner. Recent trips have taken the club to Holbrook and Culcairn, with a Sunday loop through Woomargama."
  - heading: "Tumbarumba–Rosewood Rail Trail"
    text: "BWW has supported the Rail Trail since its approval as a pilot project in 2015 — a 22km trail on the old rail corridor between Tumbarumba and Rosewood, officially opened during COVID-19 in 2020."
    image: "/assets/img/about-railtrail.png"

safety_heading: "Be Safe. Be Smart. Be Seen."
safety_text: "BWW promotes cycling as a safe and responsible mode of transport, in partnership with Wagga Wagga City Council, state government and other local cycling clubs."
safety_cards:
  - heading: "Be Safe! Be Smart! Be Seen!"
    text: "This campaign encourages cyclists to wear light-coloured, reflective clothing — especially through the darker winter months — and use legally required lighting. Past campaigns have included radio and print advertising, street banners, and free reflective slap-bands distributed through local bike shops."
    pdf: "/assets/docs/bww.BeSeenInfoSheet.pdf"
    pdf_label: "Be Seen info sheet (PDF)"
  - heading: "Share the Road"
    text: "BWW contributed to the Share the Road campaign led by Committee 4 Wagga, bringing together cycling clubs, bike shops and local businesses to fund roadside signage on popular cycling routes, alongside print, radio and TV safety messages."
hazard_heading: "Seen a hazard?"
hazard_text: "If you see something dangerous on the road — or that could become that way — report it to Wagga Wagga City Council yourself. Don't assume someone else has. Council can't fix what they don't know about, and duplicate reports are far better than none."
hazard_phone: "1300 292 442 or 02 6926 9100"

tips_heading: "Getting back on the bike"
tips_text: "General information only — for specific advice, talk to one of the local specialist bike shops."
tips_cards:
  - heading: "What bike should I ride?"
    text: "There's no single right answer — and what suits you can change as you mature as a rider. It's worth visiting a specialist bike shop, where experienced staff can recommend a bike to match what you actually want to do. Don't let price alone decide; a cheap bike bought without advice is one of the more common reasons people give up on cycling."
  - heading: "NSW handbook for bicycle riders"
    text: "The NSW Roads and Maritime Services publishes a handbook covering road safety, bicycle maintenance, road rules and the legal side of riding — useful reading whether you're getting back on a bike after years away or riding for the first time."

committee_heading: "Run by volunteers, for members"
committee_text: "Committee information and position descriptions are available to members. If you need access, contact the club for the current code."
